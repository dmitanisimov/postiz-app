name: Build Custom Postiz Image

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-custom-image:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -f Dockerfile.dev \
            -t ghcr.io/dmitanisimov/postiz-app:latest \
            --build-arg NEXT_PUBLIC_VERSION=custom \
            --pull \
            --no-cache \
            --provenance=false \
            --sbom=false \
            --push \
            .
